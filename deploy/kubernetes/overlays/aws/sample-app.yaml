apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: traffic-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sample-app
      cloud-provider: aws
  template:
    metadata:
      labels:
        app: sample-app
        cloud-provider: aws
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: sample-app
          image: multi-cloud-router/sample-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: CLOUD_PROVIDER
              value: aws
            - name: REGION
              value: us-east-1
            - name: SERVICE_NAME
              value: traffic-demo-api
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: sample-app
  namespace: traffic-app
spec:
  type: LoadBalancer
  selector:
    app: sample-app
    cloud-provider: aws
  ports:
    - name: http
      port: 80
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sample-app
  namespace: traffic-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sample-app
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Pods
      pods:
        metric:
          name: http_requests_per_second
        target:
          type: AverageValue
          averageValue: "15"
