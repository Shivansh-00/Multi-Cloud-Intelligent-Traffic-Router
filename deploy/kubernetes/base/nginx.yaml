apiVersion: apps/v1
kind: Deployment
metadata:
  name: global-edge
  namespace: control-plane
spec:
  replicas: 2
  selector:
    matchLabels:
      app: global-edge
  template:
    metadata:
      labels:
        app: global-edge
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: global-edge
  namespace: control-plane
spec:
  type: NodePort
  selector:
    app: global-edge
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
