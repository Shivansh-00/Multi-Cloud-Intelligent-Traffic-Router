services:
  sample-app-aws:
    build:
      context: ../../services/sample-app
    image: multi-cloud-router/sample-app:compose
    container_name: multi-cloud-sample-app-aws
    environment:
      CLOUD_PROVIDER: aws
      REGION: us-east-1
      SERVICE_NAME: traffic-demo-api
    networks:
      - traffic-router

  sample-app-gcp:
    build:
      context: ../../services/sample-app
    image: multi-cloud-router/sample-app:compose
    container_name: multi-cloud-sample-app-gcp
    environment:
      CLOUD_PROVIDER: gcp
      REGION: us-central1
      SERVICE_NAME: traffic-demo-api
    networks:
      - traffic-router

  router:
    build:
      context: ../../services/router
    image: multi-cloud-router/router:compose
    container_name: multi-cloud-router
    depends_on:
      - sample-app-aws
      - sample-app-gcp
    environment:
      BACKENDS_JSON: >-
        [{"name":"aws-primary","cloud":"aws","base_url":"http://sample-app-aws:8000","base_weight":1.0},{"name":"gcp-secondary","cloud":"gcp","base_url":"http://sample-app-gcp:8000","base_weight":1.0}]
      PROBE_INTERVAL_SECONDS: 2
      FAILURE_THRESHOLD: 2
      TARGET_LATENCY_MS: 250
      MAX_ERROR_RATE: 0.05
      MAX_INFLIGHT: 100
      PRIMARY_PREFERENCE_RATIO: 1.35
    networks:
      traffic-router:
        aliases:
          - intelligent-router

  global-edge:
    image: nginx:1.27-alpine
    container_name: multi-cloud-global-edge
    depends_on:
      - router
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - traffic-router

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: multi-cloud-prometheus
    depends_on:
      - router
      - sample-app-aws
      - sample-app-gcp
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - traffic-router

  grafana:
    image: grafana/grafana:11.6.0
    container_name: multi-cloud-grafana
    depends_on:
      - prometheus
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_BASIC_ENABLED: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/datasource.yaml:/etc/grafana/provisioning/datasources/datasource.yaml:ro
      - ./grafana/dashboard-provider.yaml:/etc/grafana/provisioning/dashboards/dashboard-provider.yaml:ro
      - ../kubernetes/base/router-dashboard.json:/var/lib/grafana/dashboards/router-dashboard.json:ro
    networks:
      - traffic-router

networks:
  traffic-router:
    name: multi-cloud-traffic-router
